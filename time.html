<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pocochaライバー向け 1週間配信時間計算ツール</title>
    <style>
        :root {
            --primary-color: #ff6b6b;
            --primary-hover: #ff5252;
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-color: #333333;
            --border-color: #e0e0e0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.5;
            padding: 20px 10px;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
        }

        header h1 {
            font-size: 1.5rem;
            color: var(--primary-color);
            margin-bottom: 5px;
        }

        header p {
            font-size: 0.85rem;
            color: #666;
        }

        .card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        .card-title {
            font-size: 1rem;
            font-weight: bold;
            margin-bottom: 15px;
            padding-bottom: 5px;
            border-bottom: 2px solid var(--bg-color);
        }

        /* 入力エリアのスタイル */
        .input-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .day-label {
            font-weight: bold;
            width: 80px;
        }

        .day-inputs {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        input[type="number"] {
            width: 70px;
            padding: 8px;
            font-size: 1rem;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            text-align: center;
        }

        input[type="number"]:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .unit {
            font-size: 0.9rem;
            color: #555;
            margin-right: 5px;
        }

        /* 結果表示エリア */
        .result-box {
            background-color: #fff5f5;
            border-left: 4px solid var(--primary-color);
            padding: 15px;
            border-radius: 0 8px 8px 0;
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .result-item:last-child {
            margin-bottom: 0;
        }

        .result-value {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--primary-color);
        }

        /* プログレスバー */
        .progress-container {
            margin-top: 15px;
        }

        .progress-bar-bg {
            background: #e9ecef;
            border-radius: 8px;
            height: 12px;
            width: 100%;
            overflow: hidden;
        }

        .progress-bar-fill {
            background: linear-gradient(90deg, #ff8787, var(--primary-color));
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
        }

        .progress-text {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: #666;
            margin-top: 5px;
        }

        /* 曜日ごとの色分け用 */
        .day-sat { color: #228be6; }
        .day-sun { color: #fa5252; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Pococha配信時間シミュレーター</h1>
        <p>1週間分のスケジュールを立てて月間上限を管理しよう</p>
    </header>

    <!-- 月累計の入力 -->
    <div class="card">
        <div class="card-title">① 今月（これまでの累計）</div>
        <div class="input-row">
            <span class="day-label">先週までの合計</span>
            <div class="day-inputs">
                <input type="number" id="past-hours" min="0" value="20" oninput="calculateTotal()">
                <span class="unit">時間</span>
                <input type="number" id="past-minutes" min="0" max="59" value="0" oninput="calculateTotal()">
                <span class="unit">分</span>
            </div>
        </div>
    </div>

    <!-- 1週間の入力 -->
    <div class="card">
        <div class="card-title">② 今週の予定（曜日ごと）</div>
        
        <div class="input-row">
            <span class="day-label">月曜日</span>
            <div class="day-inputs">
                <input type="number" class="week-hours" min="0" value="2" oninput="calculateTotal()"> <span class="unit">h</span>
                <input type="number" class="week-minutes" min="0" max="59" value="0" oninput="calculateTotal()"> <span class="unit">m</span>
            </div>
        </div>
        <div class="input-row">
            <span class="day-label">火曜日</span>
            <div class="day-inputs">
                <input type="number" class="week-hours" min="0" value="2" oninput="calculateTotal()"> <span class="unit">h</span>
                <input type="number" class="week-minutes" min="0" max="59" value="0" oninput="calculateTotal()"> <span class="unit">m</span>
            </div>
        </div>
        <div class="input-row">
            <span class="day-label">水曜日</span>
            <div class="day-inputs">
                <input type="number" class="week-hours" min="0" value="2" oninput="calculateTotal()"> <span class="unit">h</span>
                <input type="number" class="week-minutes" min="0" max="59" value="0" oninput="calculateTotal()"> <span class="unit">m</span>
            </div>
        </div>
        <div class="input-row">
            <span class="day-label">木曜日</span>
            <div class="day-inputs">
                <input type="number" class="week-hours" min="0" value="2" oninput="calculateTotal()"> <span class="unit">h</span>
                <input type="number" class="week-minutes" min="0" max="59" value="0" oninput="calculateTotal()"> <span class="unit">m</span>
            </div>
        </div>
        <div class="input-row">
            <span class="day-label">金曜日</span>
            <div class="day-inputs">
                <input type="number" class="week-hours" min="0" value="2" oninput="calculateTotal()"> <span class="unit">h</span>
                <input type="number" class="week-minutes" min="0" max="59" value="0" oninput="calculateTotal()"> <span class="unit">m</span>
            </div>
        </div>
        <div class="input-row">
            <span class="day-label day-sat">土曜日</span>
            <div class="day-inputs">
                <input type="number" class="week-hours" min="0" value="3" oninput="calculateTotal()"> <span class="unit">h</span>
                <input type="number" class="week-minutes" min="0" max="59" value="0" oninput="calculateTotal()"> <span class="unit">m</span>
            </div>
        </div>
        <div class="input-row">
            <span class="day-label day-sun">日曜日</span>
            <div class="day-inputs">
                <input type="number" class="week-hours" min="0" value="0" oninput="calculateTotal()"> <span class="unit">h</span>
                <input type="number" class="week-minutes" min="0" max="59" value="0" oninput="calculateTotal()"> <span class="unit">m</span>
            </div>
        </div>
    </div>

    <!-- 計算結果 -->
    <div class="card">
        <div class="card-title">③ 計算結果</div>
        <div class="result-box">
            <div class="result-item">
                <span>今週の合計配信：</span>
                <span class="result-value" id="week-total">0 時間 0 分</span>
            </div>
            <div class="result-item">
                <span>新しい月間累計：</span>
                <span class="result-value" id="month-total">0 時間 0 分</span>
            </div>
            
            <div class="progress-container">
                <div class="progress-bar-bg">
                    <div class="progress-bar-fill" id="progress-fill"></div>
                </div>
                <div class="progress-text">
                    <span id="progress-percent">月間上限（80h）まであと: 80時間0分</span>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
function calculateTotal() {
    // 1. 先週までの累計を分に変換
    const pastH = parseInt(document.getElementById('past-hours').value) || 0;
    const pastM = parseInt(document.getElementById('past-minutes').value) || 0;
    const pastTotalMinutes = (pastH * 60) + pastM;

    // 2. 今週の7日分をループして合計の分を出す
    const hoursInputs = document.querySelectorAll('.week-hours');
    const minutesInputs = document.querySelectorAll('.week-minutes');
    
    let weekMinutes = 0;
    for (let i = 0; i < hoursInputs.length; i++) {
        const h = parseInt(hoursInputs[i].value) || 0;
        const m = parseInt(minutesInputs[i].value) || 0;
        weekMinutes += (h * 60) + m;
    }

    // 3. 週合計を表示用に変換
    const weekH = Math.floor(weekMinutes / 60);
    const weekM = weekMinutes % 60;
    document.getElementById('week-total').innerText = `${weekH} 時間 ${weekM} 分`;

    // 4. 月累計を計算して表示
    const grandTotalMinutes = pastTotalMinutes + weekMinutes;
    const monthH = Math.floor(grandTotalMinutes / 60);
    const monthM = grandTotalMinutes % 60;
    document.getElementById('month-total').innerText = `${monthH} 時間 ${monthM} 分`;

    // 5. Pococha上限（80時間 = 4800分）に対するプログレスバーの計算
    const limitMinutes = 80 * 60;
    let percentage = (grandTotalMinutes / limitMinutes) * 100;
    if (percentage > 100) percentage = 100; // 100%を超えないように制御
    
    document.getElementById('progress-fill').style.width = `${percentage}%`;

    // 残り時間の表示
    const remainMinutes = limitMinutes - grandTotalMinutes;
    const progressTextElement = document.getElementById('progress-percent');
    
    if (remainMinutes > 0) {
        const remH = Math.floor(remainMinutes / 60);
        const remM = remainMinutes % 60;
        progressTextElement.innerText = `月間上限（80h）まであと: ${remH}時間${remM}分`;
        progressTextElement.style.color = '#666';
    } else {
        progressTextElement.innerText = `上限の80時間に達しました！🎉`;
        progressTextElement.style.color = '#ff6b6b';
    }
}

// ページを開いたときに初期計算を走らせる
window.onload = calculateTotal;
</script>

</body>
</html>
