<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pococha 時給条件・配信時間計算ツール</title>
    <style>
        :root {
            --primary-color: #00b4d8;
            --success-color: #2bc48a;
            --bg-color: #f1f5f9;
            --card-bg: #ffffff;
            --text-color: #1e293b;
            --border-color: #cbd5e1;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 20px 10px;
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
        }

        header h1 {
            font-size: 1.4rem;
            color: #0f172a;
            margin-bottom: 5px;
        }

        .badge-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 8px;
        }

        .badge {
            background: #e2e8f0;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
            color: #475569;
        }

        .card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: 0 4px 12px rgba(15, 23, 42, 0.05);
        }

        .card-title {
            font-size: 0.95rem;
            font-weight: bold;
            margin-bottom: 15px;
            color: #475569;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .input-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .day-label {
            font-weight: 600;
            width: 70px;
            font-size: 0.95rem;
        }

        .day-inputs {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        input[type="number"] {
            width: 65px;
            padding: 8px;
            font-size: 1rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            text-align: center;
            background: #f8fafc;
        }

        input[type="number"]:focus {
            outline: none;
            border-color: var(--primary-color);
            background: #fff;
        }

        .unit {
            font-size: 0.85rem;
            color: #64748b;
            margin-right: 4px;
        }

        /* 結果表示・進捗 */
        .result-box {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .status-section {
            background: #f8fafc;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
        }

        .status-header {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            font-weight: bold;
            margin-bottom: 6px;
        }

        .status-time {
            font-size: 1.25rem;
            font-weight: 800;
            color: #0f172a;
        }

        .progress-bar-bg {
            background: #e2e8f0;
            border-radius: 6px;
            height: 8px;
            width: 100%;
            overflow: hidden;
            margin: 8px 0;
        }

        .progress-bar-fill {
            background: var(--primary-color);
            height: 100%;
            width: 0%;
            transition: width 0.3s ease, background-color 0.3s;
        }

        .progress-bar-fill.complete {
            background: var(--success-color);
        }

        .remain-text {
            font-size: 0.8rem;
            font-weight: 600;
            text-align: right;
        }

        .day-sat { color: #2563eb; }
        .day-sun { color: #dc2626; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>ライバー配信時間マネージャー</h1>
        <div class="badge-container">
            <span class="badge">週ノルマ: 19時間</span>
            <span class="badge">月ノルマ: 75時間</span>
        </div>
    </header>

    <!-- ① 月累計の入力 -->
    <div class="card">
        <div class="card-title">📊 ① 先週までの月間累計</div>
        <div class="input-row">
            <span class="day-label" style="width: auto;">今月（先週まで）の合計</span>
            <div class="day-inputs">
                <input type="number" id="past-hours" min="0" value="40" oninput="calculateTotal()">
                <span class="unit">時間</span>
                <input type="number" id="past-minutes" min="0" max="59" value="0" oninput="calculateTotal()">
                <span class="unit">分</span>
            </div>
        </div>
    </div>

    <!-- ② 1週間の入力 -->
    <div class="card">
        <div class="card-title">🗓️ ② 今週の配信スケジュール</div>
        
        <div class="input-row"><span class="day-label">月曜日</span><div class="day-inputs"><input type="number" class="week-hours" min="0" value="3" oninput="calculateTotal()"><span class="unit">h</span><input type="number" class="week-minutes" min="0" max="59" value="0" oninput="calculateTotal()"><span class="unit">m</span></div></div>
        <div class="input-row"><span class="day-label">火曜日</span><div class="day-inputs"><input type="number" class="week-hours" min="0" value="3" oninput="calculateTotal()"><span class="unit">h</span><input type="number" class="week-minutes" min="0" max="59" value="0" oninput="calculateTotal()"><span class="unit">m</span></div></div>
        <div class="input-row"><span class="day-label">水曜日</span><div class="day-inputs"><input type="number" class="week-hours" min="0" value="3" oninput="calculateTotal()"><span class="unit">h</span><input type="number" class="week-minutes" min="0" max="59" value="0" oninput="calculateTotal()"><span class="unit">m</span></div></div>
        <div class="input-row"><span class="day-label">木曜日</span><div class="day-inputs"><input type="number" class="week-hours" min="0" value="0" oninput="calculateTotal()"><span class="unit">h</span><input type="number" class="week-minutes" min="0" max="59" value="0" oninput="calculateTotal()"><span class="unit">m</span></div></div>
        <div class="input-row"><span class="day-label">金曜日</span><div class="day-inputs"><input type="number" class="week-hours" min="0" value="3" oninput="calculateTotal()"><span class="unit">h</span><input type="number" class="week-minutes" min="0" max="59" value="0" oninput="calculateTotal()"><span class="unit">m</span></div></div>
        <div class="input-row"><span class="day-label day-sat">土曜日</span><div class="day-inputs"><input type="number" class="week-hours" min="0" value="4" oninput="calculateTotal()"><span class="unit">h</span><input type="number" class="week-minutes" min="0" max="59" value="0" oninput="calculateTotal()"><span class="unit">m</span></div></div>
        <div class="input-row"><span class="day-label day-sun">日曜日</span><div class="day-inputs"><input type="number" class="week-hours" min="0" value="0" oninput="calculateTotal()"><span class="unit">h</span><input type="number" class="week-minutes" min="0" max="59" value="0" oninput="calculateTotal()"><span class="unit">m</span></div></div>
    </div>

    <!-- ③ 条件クリア状況 -->
    <div class="card">
        <div class="card-title">🏁 ③ 時給条件クリア状況</div>
        <div class="result-box">
            
            <!-- 週条件 (19時間) -->
            <div class="status-section">
                <div class="status-header">
                    <span>今週の合計</span>
                    <span class="status-time" id="week-total">0時間0分</span>
                </div>
                <div class="progress-bar-bg">
                    <div class="progress-bar-fill" id="week-fill"></div>
                </div>
                <div class="remain-text" id="week-remain" style="color: #64748b;"></div>
            </div>

            <!-- 月条件 (75時間) -->
            <div class="status-section">
                <div class="status-header">
                    <span>今月の累計</span>
                    <span class="status-time" id="month-total">0時間0分</span>
                </div>
                <div class="progress-bar-bg">
                    <div class="progress-bar-fill" id="month-fill"></div>
                </div>
                <div class="remain-text" id="month-remain" style="color: #64748b;"></div>
            </div>

        </div>
    </div>
</div>

<script>
function calculateTotal() {
    // 定数定義 (分換算)
    const WEEK_LIMIT = 19 * 60; // 1140分
    const MONTH_LIMIT = 75 * 60; // 4500分

    // 1. 先週までの累計
    const pastH = parseInt(document.getElementById('past-hours').value) || 0;
    const pastM = parseInt(document.getElementById('past-minutes').value) || 0;
    const pastTotalMinutes = (pastH * 60) + pastM;

    // 2. 今週の7日分を合計
    const hoursInputs = document.querySelectorAll('.week-hours');
    const minutesInputs = document.querySelectorAll('.week-minutes');
    let weekMinutes = 0;
    for (let i = 0; i < hoursInputs.length; i++) {
        weekMinutes += (parseInt(hoursInputs[i].value) || 0) * 60 + (parseInt(minutesInputs[i].value) || 0);
    }

    // 表示用：週合計
    const weekH = Math.floor(weekMinutes / 60);
    const weekM = weekMinutes % 60;
    document.getElementById('week-total').innerText = `${weekH}時間${weekM}分`;

    // 表示用：月合計
    const grandTotalMinutes = pastTotalMinutes + weekMinutes;
    const monthH = Math.floor(grandTotalMinutes / 60);
    const monthM = grandTotalMinutes % 60;
    document.getElementById('month-total').innerText = `${monthH}時間${monthM}分`;

    // --- 週プログレス制御 ---
    let weekPercent = (weekMinutes / WEEK_LIMIT) * 100;
    const weekFill = document.getElementById('week-fill');
    const weekRemain = document.getElementById('week-remain');
    
    if (weekPercent >= 100) {
        weekFill.style.width = '100%';
        weekFill.classList.add('complete');
        weekRemain.innerText = '今週の条件クリア！✨';
        weekRemain.style.color = 'var(--success-color)';
    } else {
        weekFill.style.width = `${weekPercent}%`;
        weekFill.classList.remove('complete');
        const remMinutes = WEEK_LIMIT - weekMinutes;
        weekRemain.innerText = `週ノルマまであと: ${Math.floor(remMinutes/60)}時間${remMinutes%60}分`;
        weekRemain.style.color = '#475569';
    }

    // --- 月プログレス制御 ---
    let monthPercent = (grandTotalMinutes / MONTH_LIMIT) * 100;
    const monthFill = document.getElementById('month-fill');
    const monthRemain = document.getElementById('month-remain');
    
    if (monthPercent >= 100) {
        monthFill.style.width = '100%';
        monthFill.classList.add('complete');
        monthRemain.innerText = '今月の条件クリア！🎉';
        monthRemain.style.color = 'var(--success-color)';
    } else {
        monthFill.style.width = `${monthPercent}%`;
        monthFill.classList.remove('complete');
        const remMinutes = MONTH_LIMIT - grandTotalMinutes;
        monthRemain.innerText = `月ノルマまであと: ${Math.floor(remMinutes/60)}時間${remMinutes%60}分`;
        monthRemain.style.color = '#475569';
    }
}

window.onload = calculateTotal;
</script>

</body>
</html>
