<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>楽曲リスト検索システム</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; padding: 20px; background-color: #f8fafc; color: #1e293b; }
        .container { max-width: 600px; margin: 20px auto; background: white; padding: 25px; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -1px rgba(0,0,0,0.03); }
        h1 { font-size: 20px; text-align: center; color: #0f172a; margin-bottom: 20px; font-weight: 700; }
        .search-box { width: 100%; padding: 14px 20px; font-size: 16px; border: 2px solid #cbd5e1; border-radius: 30px; box-sizing: border-box; outline: none; transition: 0.2s; }
        .search-box:focus { border-color: #3b82f6; box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1); }
        .status { font-size: 13px; color: #64748b; margin: 15px 0 10px 10px; font-weight: 600; }
        .results-list { max-height: 500px; overflow-y: auto; border: 1px solid #e2e8f0; border-radius: 12px; background: #fff; }
        .result-item { padding: 14px 16px; border-bottom: 1px solid #f1f5f9; font-size: 15px; line-height: 1.5; }
        .result-item:last-child { border-bottom: none; }
        .match-text { background-color: #fef08a; padding: 1px 3px; border-radius: 4px; }
        .loading { text-align: center; padding: 40px; color: #64748b; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🎵 楽曲リスト 高速検索</h1>
    <div id="loading" class="loading">⏳ 14,000件のデータを読み込み中...</div>
    
    <div id="searchSection" style="display: none;">
        <input type="text" id="searchInput" class="search-box" placeholder="歌手名や曲名を入力...">
        <div id="status" class="status"></div>
        <div id="results" class="results-list"></div>
    </div>
</div>

<script>
    let songs = [];
    const loadingEl = document.getElementById('loading');
    const searchSectionEl = document.getElementById('searchSection');
    const searchInput = document.getElementById('searchInput');
    const statusEl = document.getElementById('status');
    const resultsEl = document.getElementById('results');

    // 起動時にjsonデータを一発で読み込む
    async function loadData() {
        try {
            const response = await fetch('songs.json');
            songs = await response.json();
            loadingEl.style.display = 'none';
            searchSectionEl.style.display = 'block';
            statusEl.textContent = `準備完了！全 ${songs.length.toLocaleString()} 件から検索できます`;
        } catch (error) {
            loadingEl.textContent = '❌ データの読み込みに失敗しました。songs.jsonが同じ場所にあるか確認してください。';
            console.error(error);
        }
    }

    // 検索処理（1万4千件をミリ秒で検索）
    searchInput.addEventListener('input', () => {
        const query = searchInput.value.trim().toLowerCase();
        resultsEl.innerHTML = '';

        if (!query) {
            statusEl.textContent = `全 ${songs.length.toLocaleString()} 件から検索できます`;
            return;
        }

        // すべての項目を合体させて検索（Excelの列名が何であっても対応可能）
        const filtered = songs.filter(item => {
            const allText = Object.values(item).join(' ').toLowerCase();
            return allText.includes(query);
        });

        statusEl.textContent = `検索結果: ${filtered.length.toLocaleString()} 件ヒット`;

        if (filtered.length === 0) {
            resultsEl.innerHTML = '<div style="padding: 30px; color: #94a3b8; text-align: center;">見つかりませんでした</div>';
            return;
        }

        // 画面に結果を表示
        const fragment = document.createDocumentFragment();
        filtered.forEach(item => {
            const div = document.createElement('div');
            div.className = 'result-item';
            
            // Excelのデータを綺麗に並べる（列の順番に合わせます）
            const displayValues = Object.entries(item).map(([key, val]) => `<strong>${key}:</strong> ${val}`);
            div.innerHTML = displayValues.join(' | ');
            
            fragment.appendChild(div);
        });
        resultsEl.appendChild(fragment);
    });

    loadData();
</script>

</body>
</html>
