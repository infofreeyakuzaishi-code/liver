<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>【採点対象楽曲】2026 Summer 検索システム</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f5f7fa;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            font-size: 24px;
            color: #2c3e50;
            margin-bottom: 30px;
        }
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        input[type="text"] {
            flex: 1;
            padding: 12px;
            font-size: 16px;
            border: 2px solid #ddd;
            border-radius: 6px;
            outline: none;
            transition: border-color 0.3s;
        }
        input[type="text"]:focus {
            border-color: #3498db;
        }
        .stats {
            margin-bottom: 20px;
            font-size: 14px;
            color: #666;
            text-align: right;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        th {
            background-color: #f8f9fa;
            color: #2c3e50;
            font-weight: bold;
        }
        .no-result {
            text-align: center;
            padding: 20px;
            color: #999;
        }
        .highlight {
            background-color: #ffeb3b;
            font-weight: bold;
        }
        .loading {
            text-align: center;
            padding: 20px;
            font-size: 16px;
            color: #3498db;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>【採点対象楽曲】2026 Summer 検索システム</h1>
    
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="歌手名、曲名、または番号を入力（部分一致）" disabled>
    </div>
    
    <div class="stats" id="stats">データを読み込み中...</div>
    
    <table id="resultTable">
        <thead>
            <tr>
                <th style="width: 15%;">番号</th>
                <th style="width: 45%;">曲名</th>
                <th style="width: 40%;">歌手名</th>
            </tr>
        </thead>
        <tbody id="resultBody">
            <tr><td colspan="3" class="loading">楽曲データベース（14,470曲）をロードしています...</td></tr>
        </tbody>
    </table>
</div>

<script>
let songDatabase = [];

// 外部JSONファイルから14,470曲のデータを読み込む
async function loadDatabase() {
    try {
        const response = await fetch('songs.json');
        songDatabase = await response.json();
        
        // ロード完了後に検索入力を有効化
        const searchInput = document.getElementById('searchInput');
        searchInput.disabled = false;
        searchInput.placeholder = "歌手名、曲名、または番号を入力してください";
        
        performSearch();
        searchInput.addEventListener('input', performSearch);
    } catch (error) {
        document.getElementById('stats').textContent = "データの読み込みに失敗しました。";
        document.getElementById('resultBody').innerHTML = `<tr><td colspan="3" class="no-result">songs.json が正しく配置されているか確認してください。</td></tr>`;
    }
}

function highlightText(text, keyword) {
    if (!keyword) return text;
    // 特殊文字をエスケープ
    const escapedKeyword = keyword.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    const regex = new RegExp(`(${escapedKeyword})`, 'gi');
    return text.replace(regex, '<span class="highlight">$1</span>');
}

function performSearch() {
    const searchInput = document.getElementById('searchInput');
    const resultBody = document.getElementById('resultBody');
    const stats = document.getElementById('stats');
    
    const keyword = searchInput.value.trim().toLowerCase();
    resultBody.innerHTML = '';
    
    // 高速フィルタリング
    const filtered = songDatabase.filter(song => {
        return (song.title && song.title.toLowerCase().includes(keyword)) || 
               (song.artist && song.artist.toLowerCase().includes(keyword)) ||
               (song.id && song.id.toString().includes(keyword));
    });
    
    stats.textContent = `該当件数: ${filtered.length}件 / 総楽曲数: ${songDatabase.length}件`;
    
    if (filtered.length === 0) {
        resultBody.innerHTML = `<tr><td colspan="3" class="no-result">該当する楽曲が見つかりませんでした。</td></tr>`;
        return;
    }
    
    // 大量ヒット時のブラウザフリーズ防止（最大200件まで描画）
    const displayLimit = 200;
    const displayList = filtered.slice(0, displayLimit);
    
    displayList.forEach(song => {
        const row = document.createElement('tr');
        row.innerHTML = `
            <td>${highlightText(song.id.toString(), keyword)}</td>
            <td>${highlightText(song.title || '', keyword)}</td>
            <td>${highlightText(song.artist || '', keyword)}</td>
        `;
        resultBody.appendChild(row);
    });
    
    if (filtered.length > displayLimit) {
        const row = document.createElement('tr');
        row.innerHTML = `<td colspan="3" class="no-result">件数が多いため最初の${displayLimit}件のみ表示しています。文字を追加して絞り込んでください。</td></tr>`;
        resultBody.appendChild(row);
    }
}

// 起動時にロードを実行
document.addEventListener('DOMContentLoaded', loadDatabase);
</script>

</body>
</html>
